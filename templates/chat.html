<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话 - 军事资料智能分析系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat_styles.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1><span>💬</span>对话</h1>
        <p class="subtitle">上传文件或文件夹后，与模型进行多轮对话。</p>
      </div>

      <div class="btn-group" style="margin-top:-12px; margin-bottom:16px;">
        <a class="btn" href="{{ url_for('main.home') }}" style="text-decoration:none; display:inline-flex; align-items:center;">
          ⬅ 返回首页
        </a>
        <a class="btn" href="{{ url_for('classify.classify_page') }}" style="text-decoration:none; display:inline-flex; align-items:center;">
          🧭 分类与信息抽取
        </a>
      </div>

      <!-- 文件选择模块 -->
      <div id="file-selection-section">
        <div class="file-selection-header">
          <h2>📁 选择对话文件</h2>
          <p class="subtitle">从已上传的文件中选择用于对话的文档</p>
          <button id="select-files-btn" class="btn btn-primary">📂 选择对话文件</button>
        </div>

        <!-- 已选文件显示区域 -->
        <div id="selected-files-section" style="display:none; margin-top:20px;">
          <div class="selected-files-header">
            <h3>✅ 已选文件列表</h3>
            <button id="start-chat-btn" class="btn btn-primary" style="display:none;">💬 开始对话</button>
            <button id="reselect-files-btn" class="btn btn-secondary">🔄 重新选择</button>
          </div>
          <div id="selected-files-list" class="selected-files-list">
            <!-- 已选文件将在这里显示 -->
          </div>
        </div>

        <div id="file-list-container" style="display:none; margin-top:16px;">
          <div class="file-list-header">
            <h3>📋 可选文件列表</h3>
            <div class="file-stats" id="file-stats"></div>
          </div>
          
          <div id="file-list" class="file-list">
            <!-- 文件列表将在这里动态生成 -->
          </div>
          
          <div id="no-files-message" class="no-files-message" style="display:none;">
            <p>📭 暂无可用的文件，请先在分类页面上传文件。</p>
          </div>
          
          <div id="error-message" class="error-message" style="display:none;">
            <!-- 错误信息将在这里显示 -->
          </div>
        </div>
      </div>

      <!-- 文件选择模态框 -->
      <div id="file-selection-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
          <div class="modal-header">
            <h3>📂 选择对话文件</h3>
            <button id="close-modal-btn" class="close-btn">&times;</button>
          </div>
          
          <div class="modal-body">
            <div class="modal-actions">
              <button id="load-files-modal-btn" class="btn">🔄 刷新列表</button>
              <div id="modal-loading-indicator" style="display:none; margin-left:16px;">
                <div class="spinner" style="display:inline-block; margin-right:8px;"></div>
                正在加载...
              </div>
            </div>

            <div id="modal-file-list-container" style="display:none; margin-top:16px;">
              <div class="file-list-header">
                <h4>📋 可选文件列表</h4>
                <div class="file-stats" id="modal-file-stats"></div>
              </div>
              
              <div id="modal-file-list" class="file-list">
                <!-- 文件列表将在这里动态生成 -->
              </div>
              
              <div id="modal-no-files-message" class="no-files-message" style="display:none;">
                <p>📭 暂无可用的文件，请先在分类页面上传文件。</p>
              </div>
              
              <div id="modal-error-message" class="error-message" style="display:none;">
                <!-- 错误信息将在这里显示 -->
              </div>
            </div>
          </div>
          
          <div class="modal-footer">
            <div class="selection-info">
              <span id="selection-count">已选择 0 个文件</span>
            </div>
            <div class="modal-buttons">
              <button id="cancel-selection-btn" class="btn btn-secondary">取消</button>
              <button id="confirm-selection-btn" class="btn btn-primary" disabled>确认选择</button>
            </div>
          </div>
        </div>
      </div>

      </div>

      <div style="margin-top:16px;">
        <label class="btn btn-file" style="margin-right:8px;">
          📂 选择文件（占位）
          <input type="file" disabled />
        </label>

          <input type="file" webkitdirectory directory multiple disabled />
        </label>
      </div>

      <button class="btn" style="margin-top:16px;" disabled>发送消息（占位）</button> -->
    </div>
  </div>

  <script src="{{ url_for('static', filename='chat.js') }}" defer></script>
</body>
</html>
