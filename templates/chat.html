<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>对话 - 军事资料智能分析系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat_styles.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1><span>💬</span>对话</h1>
        <p class="subtitle">上传文件或文件夹后，与模型进行多轮对话（本页面为占位，可独立开发）。</p>
      </div>

      <div class="btn-group" style="margin-top:-12px; margin-bottom:16px;">
        <a class="btn" href="{{ url_for('main.home') }}" style="text-decoration:none; display:inline-flex; align-items:center;">
          ⬅ 返回首页
        </a>
        <a class="btn" href="{{ url_for('classify.classify_page') }}" style="text-decoration:none; display:inline-flex; align-items:center;">
          🧭 分类与信息抽取
        </a>
      </div>

      <!-- 文件选择模块 -->
      <div id="file-selection-section">
        <div class="file-selection-header">
          <h2>📁 选择对话文件</h2>
          <p class="subtitle">从已上传的文件中选择用于对话的文档</p>
        </div>

        <div class="file-actions">
          <button id="load-files-btn" class="btn">🔄 加载文件列表</button>
          <div id="loading-indicator" style="display:none; margin-left:16px;">
            <div class="spinner" style="display:inline-block; margin-right:8px;"></div>
            正在加载文件列表...
          </div>
        </div>

        <div id="file-list-container" style="display:none; margin-top:16px;">
          <div class="file-list-header">
            <h3>📋 可选文件列表</h3>
            <div class="file-stats" id="file-stats"></div>
          </div>
          
          <div id="file-list" class="file-list">
            <!-- 文件列表将在这里动态生成 -->
          </div>
          
          <div id="no-files-message" class="no-files-message" style="display:none;">
            <p>📭 暂无可用的文件，请先在分类页面上传文件。</p>
          </div>
          
          <div id="error-message" class="error-message" style="display:none;">
            <!-- 错误信息将在这里显示 -->
          </div>
        </div>
      </div>

      </div>

  </div>

  <script src="{{ url_for('static', filename='chat.js') }}" defer></script>
</body>
